<!doctype html>
<html lang="en">
  <head>
    <script>
      // Redefine window.fetch to make it writable and configurable.
      // This prevents "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // when polyfills or platform scripts try to override fetch in some sandboxed environments.
      try {
        if (typeof window !== 'undefined' && window.fetch) {
          const originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            value: originalFetch,
            writable: true,
            configurable: true,
            enumerable: true
          });
        }
      } catch (e) {
        console.warn("Could not redefine window.fetch:", e);
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GrindStreaks - Consistent Timetable & Habit Tracker</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
  </head>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
