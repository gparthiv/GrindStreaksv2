<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Radial gradient representing a dense green heatmap -->
    <radialGradient id="heatmapGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="20%" stop-color="#22c55e" stop-opacity="1" />
      <stop offset="55%" stop-color="#15803d" stop-opacity="0.95" />
      <stop offset="85%" stop-color="#14532d" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#14532d" stop-opacity="0" />
    </radialGradient>
    
    <!-- Subtle drop shadow to give it a modern 3D floating effect on dark and light backgrounds -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Heatmap outer glow / pulse circle -->
  <circle cx="256" cy="256" r="230" fill="url(#heatmapGrad)" filter="url(#glow)" />
  
  <!-- Heatmap high-intensity inner core for sharp visual identity -->
  <circle cx="256" cy="256" r="80" fill="#22c55e" opacity="0.3" filter="url(#glow)" />
  <circle cx="256" cy="256" r="40" fill="#ffffff" opacity="0.7" />
</svg>
