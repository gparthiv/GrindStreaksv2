<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Beautiful high-fidelity radial gradient matching the user's uploaded image exactly -->
    <radialGradient id="greenRadialFavicon" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#00FF87" stop-opacity="1" />
      <stop offset="25%" stop-color="#10B981" stop-opacity="0.9" />
      <stop offset="50%" stop-color="#34D399" stop-opacity="0.6" />
      <stop offset="75%" stop-color="#A7F3D0" stop-opacity="0.3" />
      <stop offset="90%" stop-color="#D1FAE5" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Single clean circle with the smooth radial gradient, mimicking the heat map density -->
  <circle cx="256" cy="256" r="256" fill="url(#greenRadialFavicon)" />
</svg>
